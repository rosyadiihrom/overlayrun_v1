<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporty Running Overlay Generator PRO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Barlow+Condensed:ital,wght@1,900&family=Bebas+Neue&family=Bruno+Ace+SC&family=Changa:wght@800&family=Fira+Sans+Condensed:ital,wght@1,900&family=Impact&family=Kanit:ital,wght@1,900&family=Montserrat:ital,wght@1,900;1,400&family=Orbitron:wght@900&family=Oswald:wght@700&family=Racing+Sans+One&family=Rubik+Mono+One&family=Russo+One&family=Share+Tech+Mono&family=Squada+One&family=Syne:wght@800&family=Syncopate:wght@700&family=Teko:wght@700&family=Wallpoet&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --accent-color: #2563eb;
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-color: #f3f4f6;
            --border-color: #374151;
            --accent-color: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .theme-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.85rem;
            margin-bottom: 5px;
            font-weight: 600;
            opacity: 0.8;
        }

        .input-group input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
        }

        /* Preview Area */
        .preview-box-wrapper {
            overflow-x: auto;
            background: repeating-conic-gradient(#80808033 0% 25%, transparent 0% 50%) 50% / 20px 20px;
            border-radius: 12px;
            border: 2px dashed var(--border-color);
            padding: 25px;
            display: flex;
            justify-content: center;
        }

        .preview-box {
            width: 520px;
            height: 160px;
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            position: relative;
            padding: 15px;
        }

        .template-section-title {
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 5px;
            margin-bottom: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 10px;
        }

        .tmpl-btn {
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            text-align: center;
            transition: all 0.2s;
        }

        .tmpl-btn.active {
            border-color: var(--accent-color);
            background: var(--accent-color);
            color: white;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-btns button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-copy { background-color: #10b981; color: white; }
        .btn-down { background-color: #2563eb; color: white; }
        .action-btns button:hover { opacity: 0.9; }

        /* =======================================================
           STYLING ATURAN PREVIEW (PURE TEXT ONLY & SHADOW)
           ====================================================== */
        .preview-box div, .preview-box span, .preview-box small {
            color: #ffffff;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
            line-height: 1.1;
            white-space: nowrap;
        }

        /* FIX: Penulisan nama font yang memiliki spasi kini dibungkus kutip tunggal secara konsisten */
        .t1 .main-val { font-family: 'Archivo Black', sans-serif; font-size: 3.5rem; letter-spacing: -2px; }
        .t1 .sub-row { font-family: 'Archivo Black', sans-serif; font-size: 1.1rem; display: flex; gap: 25px; margin-top: 2px; }

        .t2 .main-val { font-family: 'Barlow Condensed', sans-serif; font-size: 4.8rem; font-style: italic; font-weight: 900; letter-spacing: -1px; }
        .t2 .sub-row { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-style: italic; display: flex; gap: 30px; }

        .t3 .main-val { font-family: 'Orbitron', sans-serif; font-size: 3.2rem; font-weight: 900; letter-spacing: 2px; color: #00ffcc; text-shadow: 0 0 8px rgba(0,255,204,0.6); }
        .t3 .sub-row { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900; display: flex; gap: 20px; margin-top: 5px; }

        .t4 .main-val { font-family: 'Syncopate', sans-serif; font-size: 2.0rem; font-weight: 700; letter-spacing: 4px; }
        .t4 .sub-row { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 0.8rem; display: flex; gap: 25px; margin-top: 10px; }

        .t5 .main-val { font-family: 'Impact', sans-serif; font-size: 4.6rem; letter-spacing: 1px; }
        .t5 .sub-row { font-family: 'Impact', sans-serif; font-size: 1.4rem; display: flex; gap: 35px; }

        .t6 { flex-direction: row !important; gap: 15px; justify-content: space-evenly !important; width: 100%; }
        .t6 .col { display: flex; flex-direction: column; align-items: center; }
        .t6 .col .lbl { font-family: 'Oswald', sans-serif; font-size: 0.75rem; opacity: 0.8; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px;}
        .t6 .col .val { font-family: 'Oswald', sans-serif; font-size: 2.3rem; font-weight: 700; }

        .t7 .main-val { font-family: 'Kanit', sans-serif; font-weight: 900; font-style: italic; font-size: 4rem; color: #ccff00; text-shadow: 0 0 12px rgba(204,255,0,0.7); }
        .t7 .sub-row { font-family: 'Kanit', sans-serif; font-weight: 900; font-style: italic; font-size: 1.1rem; display: flex; gap: 25px; }

        .t8 .main-val { font-family: 'Racing Sans One', sans-serif; font-size: 3.6rem; letter-spacing: -1px; }
        .t8 .sub-row { font-family: 'Russo One', sans-serif; font-size: 1.1rem; display: flex; gap: 20px; margin-top: 4px; }

        .t9 .main-val { font-family: 'Teko', sans-serif; font-size: 5.5rem; text-transform: uppercase; margin-bottom: -10px; }
        .t9 .sub-row { font-family: 'Teko', sans-serif; font-size: 1.8rem; display: flex; gap: 35px; }

        .t10 { align-items: flex-start !important; padding-left: 35px !important; }
        .t10 .main-val { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 3.5rem; letter-spacing: -3px; }
        .t10 .sub-row { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1rem; display: flex; gap: 20px; }

        .t11 .main-val { font-family: 'Bebas Neue', sans-serif; font-size: 5.5rem; letter-spacing: 3px; }
        .t11 .sub-row { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; display: flex; gap: 40px; letter-spacing: 1px; margin-top: -5px;}

        .t12 .main-val { font-family: 'Fira Sans Condensed', sans-serif; font-weight: 900; font-style: italic; font-size: 4.4rem; letter-spacing: -1px; color: #ff3366; }
        .t12 .sub-row { font-family: 'Fira Sans Condensed', sans-serif; font-weight: 900; font-style: italic; font-size: 1.3rem; display: flex; gap: 25px; color: #fff; }

        .t13 .main-val { font-family: 'Changa', sans-serif; font-size: 3.6rem; letter-spacing: -2px; font-weight: 800; text-transform: uppercase; }
        .t13 .sub-row { font-family: 'Changa', sans-serif; font-size: 1.2rem; display: flex; gap: 30px; font-weight: 800; color: #ffea00; }

        .t14 .main-val { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; text-transform: uppercase; }
        .t14 .sub-row { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; display: flex; gap: 25px; margin-top: 5px; }

        .t15 { align-items: flex-end !important; padding-right: 40px !important; }
        .t15 .main-val { font-family: 'Share Tech Mono', monospace; font-size: 3.8rem; color: #00ff66; }
        .t15 .sub-row { font-family: 'Share Tech Mono', monospace; font-size: 1.1rem; display: flex; gap: 20px; }

        .t16 .main-val { font-family: 'Squada One', sans-serif; font-size: 5rem; letter-spacing: 1px; }
        .t16 .sub-row { font-family: 'Squada One', sans-serif; font-size: 1.5rem; display: flex; gap: 30px; letter-spacing: 1px; }

        .t17 .main-val { font-family: 'Wallpoet', sans-serif; font-size: 2.8rem; color: #ff00ff; text-shadow: 0 0 10px #ff00ffaa; }
        .t17 .sub-row { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1rem; display: flex; gap: 20px; margin-top: 8px; }

        .t18 { text-align: center; }
        .t18 .main-val { font-family: 'Bruno Ace SC', sans-serif; font-size: 2.6rem; letter-spacing: 2px; }
        .t18 .sub-row { font-family: 'Bruno Ace SC', sans-serif; font-size: 0.9rem; display: flex; gap: 25px; margin-top: 8px; justify-content: center; }

        .t19 { flex-direction: row !important; justify-content: center !important; gap: 30px; width: 100%; }
        .t19 .left-part { font-family: 'Impact', sans-serif; font-size: 4.5rem; border-right: 3px solid #fff; padding-right: 25px; }
        .t19 .right-part { display: flex; flex-direction: column; gap: 4px; font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 700; align-items: flex-start; }

        .t20 .main-val { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 3.2rem; }
        .t20 .sub-row { font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 1.1rem; display: flex; gap: 25px; letter-spacing: 2px; margin-top: 2px; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🏃‍♂️ Sporty Run Overlay PRO</h1>
            <button class="theme-btn" id="themeToggle">Dark Mode</button>
        </header>

        <div class="panel">
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Jarak (KM)</label>
                    <input type="number" id="inputDistance" value="1.42" step="0.01" min="0.01">
                </div>
                <div class="input-group">
                    <label>Pace (Min/KM)</label>
                    <input type="text" id="inputPace" value="9:24">
                </div>
                <div class="input-group">
                    <label>Waktu</label>
                    <input type="text" id="inputTime" value="13m 23s">
                </div>
                <div class="input-group">
                    <label>Elevasi / Gain (M)</label>
                    <input type="number" id="inputElev" value="8">
                </div>
            </div>
        </div>

        <h3 style="margin-bottom: 5px;">Live Preview (Background Transparan)</h3>
        <div class="preview-box-wrapper">
            <div class="preview-box t1" id="overlayPreview">
                </div>
        </div>

        <div class="panel" style="margin-top: 20px;">
            <div class="template-section-title">Pilih Gaya Overlay (1 - 20)</div>
            <div class="template-grid">
                <button class="tmpl-btn active" onclick="changeTemplate(1, this)">1</button>
                <button class="tmpl-btn" onclick="changeTemplate(2, this)">2</button>
                <button class="tmpl-btn" onclick="changeTemplate(3, this)">3</button>
                <button class="tmpl-btn" onclick="changeTemplate(4, this)">4</button>
                <button class="tmpl-btn" onclick="changeTemplate(5, this)">5</button>
                <button class="tmpl-btn" onclick="changeTemplate(6, this)">6</button>
                <button class="tmpl-btn" onclick="changeTemplate(7, this)">7</button>
                <button class="tmpl-btn" onclick="changeTemplate(8, this)">8</button>
                <button class="tmpl-btn" onclick="changeTemplate(9, this)">9</button>
                <button class="tmpl-btn" onclick="changeTemplate(10, this)">10</button>
                <button class="tmpl-btn" onclick="changeTemplate(11, this)">11</button>
                <button class="tmpl-btn" onclick="changeTemplate(12, this)">12</button>
                <button class="tmpl-btn" onclick="changeTemplate(13, this)">13</button>
                <button class="tmpl-btn" onclick="changeTemplate(14, this)">14</button>
                <button class="tmpl-btn" onclick="changeTemplate(15, this)">15</button>
                <button class="tmpl-btn" onclick="changeTemplate(16, this)">16</button>
                <button class="tmpl-btn" onclick="changeTemplate(17, this)">17</button>
                <button class="tmpl-btn" onclick="changeTemplate(18, this)">18</button>
                <button class="tmpl-btn" onclick="changeTemplate(19, this)">19</button>
                <button class="tmpl-btn" onclick="changeTemplate(20, this)">20</button>
            </div>
        </div>

        <div class="action-btns">
            <button class="btn-copy" id="btnCopy">Salin Gambar (Clipboard)</button>
            <button class="btn-down" id="btnDownload">Unduh PNG Transparan</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const inputDistance = document.getElementById('inputDistance');
        const inputPace = document.getElementById('inputPace');
        const inputTime = document.getElementById('inputTime');
        const inputElev = document.getElementById('inputElev');

        const previewBox = document.getElementById('overlayPreview');
        const themeToggle = document.getElementById('themeToggle');

        let currentTemplate = 1;

        // --- MATH CONVERSIONS ENGINE ---
        function timeToSeconds(timeStr) {
            let totalSeconds = 0;
            const hourMatch = timeStr.match(/(\d+)\s*h/i);
            const minMatch = timeStr.match(/(\d+)\s*m/i);
            const secMatch = timeStr.match(/(\d+)\s*s/i);

            if (hourMatch) totalSeconds += parseInt(hourMatch[1]) * 3600;
            if (minMatch) totalSeconds += parseInt(minMatch[1]) * 60;
            if (secMatch) totalSeconds += parseInt(secMatch[1]);

            if(!hourMatch && !minMatch && !secMatch) {
                const parts = timeStr.split(':');
                if(parts.length === 2) {
                    totalSeconds += parseInt(parts[0]) * 60 + parseInt(parts[1]);
                } else {
                    totalSeconds += parseInt(timeStr) || 0;
                }
            }
            return totalSeconds;
        }

        function secondsToTimeStr(seconds) {
            if (seconds <= 0 || isNaN(seconds)) return "0m 0s";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.round(seconds % 60);

            let result = [];
            if (h > 0) result.push(`${h}h`);
            if (m > 0 || h > 0) result.push(`${m}m`);
            result.push(`${s}s`);
            return result.join(' ');
        }

        function paceToSeconds(paceStr) {
            const parts = paceStr.replace(/[‘'’"”]/g, ':').split(':');
            if(parts.length >= 2) {
                return (parseInt(parts[0]) * 60) + (parseInt(parts[1]) || 0);
            }
            return parseFloat(paceStr) * 60 || 0;
        }

        function secondsToPaceStr(seconds) {
            if (seconds <= 0 || isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function formatPaceForUi(paceStr) {
            const clean = paceStr.replace(/[‘'’"”]/g, ':').split(':');
            if(clean.length >= 2) {
                return `${clean[0]}'${clean[1]}"`;
            }
            return paceStr;
        }

        // --- AUTOMATIC CALCULATOR ---
        function calculateAndRender(triggeredBy) {
            let dist = parseFloat(inputDistance.value) || 0;

            if (dist > 0) {
                if (triggeredBy === 'distance' || triggeredBy === 'pace') {
                    if(inputPace.value.includes(':') || parseFloat(inputPace.value)) {
                        let paceSec = paceToSeconds(inputPace.value);
                        let totalSec = paceSec * dist;
                        inputTime.value = secondsToTimeStr(totalSec);
                    }
                } else if (triggeredBy === 'time') {
                    let totalSec = timeToSeconds(inputTime.value);
                    let paceSec = totalSec / dist;
                    inputPace.value = secondsToPaceStr(paceSec);
                }
            }
            renderOverlay();
        }

        // --- CORE OVERLAY RENDERER ---
        function renderOverlay() {
            const dist = (parseFloat(inputDistance.value) || 0).toFixed(2);
            const paceUi = formatPaceForUi(inputPace.value);
            const timeUi = inputTime.value.toUpperCase();
            const elev = inputElev.value || '0';

            previewBox.innerHTML = '';

            if (currentTemplate === 6) {
                previewBox.innerHTML = `
                    <div class="col"><span class="lbl">Distance</span><span class="val">${dist} KM</span></div>
                    <div class="col"><span class="lbl">Pace</span><span class="val">${paceUi}</span></div>
                    <div class="col"><span class="lbl">Time</span><span class="val">${timeUi}</span></div>
                    <div class="col"><span class="lbl">Elevation</span><span class="val">${elev}M</span></div>
                `;
            } else if (currentTemplate === 19) {
                previewBox.innerHTML = `
                    <div class="left-part">${dist} KM</div>
                    <div class="right-part">
                        <span>PACE: ${paceUi}</span>
                        <span>TIME: ${timeUi}</span>
                        <span>GAIN: ${elev} M</span>
                    </div>
                `;
            } else {
                previewBox.innerHTML = `
                    <div class="main-val">${dist} KM</div>
                    <div class="sub-row">
                        <span>${paceUi}</span>
                        <span>${timeUi}</span>
                        <span>${elev} M</span>
                    </div>
                `;
            }
        }

        // --- EVENT LISTENERS ---
        inputDistance.addEventListener('input', () => calculateAndRender('distance'));
        inputPace.addEventListener('input', () => calculateAndRender('pace'));
        inputTime.addEventListener('input', () => calculateAndRender('time'));
        inputElev.addEventListener('input', renderOverlay);

        window.changeTemplate = function(id, btn) {
            document.querySelectorAll('.tmpl-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            previewBox.className = `preview-box t${id}`;
            currentTemplate = id;
            renderOverlay();
        }

        // --- EXPORT HANDLING ---
        const exportOptions = {
            backgroundColor: null,
            scale: 3, 
            logging: false,
            useCORS: true
        };

        document.getElementById('btnDownload').addEventListener('click', () => {
            html2canvas(previewBox, exportOptions).then(canvas => {
                const link = document.createElement('a');
                link.download = `running-overlay-gaya${currentTemplate}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });

        document.getElementById('btnCopy').addEventListener('click', () => {
            html2canvas(previewBox, exportOptions).then(canvas => {
                canvas.toBlob(blob => {
                    navigator.clipboard.write([
                        new ClipboardItem({ "image/png": blob })
                    ]).then(() => {
                        alert('✅ Overlay transparan berhasil disalin ke clipboard!');
                    }).catch(err => {
                        alert('Gagal menyalin otomatis. Gunakan tombol download PNG.');
                    });
                }, 'image/png');
            });
        });

        // --- DARK MODE TOGGLE ---
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                themeToggle.innerText = 'Dark Mode';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeToggle.innerText = 'Light Mode';
            }
        });

        document.body.setAttribute('data-theme', 'dark');
        themeToggle.innerText = 'Light Mode';
        
        renderOverlay();
    </script>
</body>
</html>
