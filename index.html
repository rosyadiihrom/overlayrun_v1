<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Overlay Generator - Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;800;900&family=Montserrat:wght@400;700;900&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #090d16;
            --card-bg: #131c2e;
            --accent-color: #00f2fe;
            --text-main: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 1.25rem 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Setara dengan lebar container utama (360px) */
        header {
            text-align: center;
            margin-bottom: 1.25rem;
            width: 100%;
            max-width: 360px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        p.subtitle {
            color: #64748b;
            margin-top: 0.3rem;
            font-size: 0.8rem;
        }

        /* Dikunci menjadi 1 kolom vertikal lurus (setara dari atas sampai bawah) */
        .container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            max-width: 360px;
            width: 100%;
        }

        /* Panel Atas: Input & Pilihan */
        .panel-control {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .calculator-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.4rem;
            background: rgba(15, 23, 42, 0.6);
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        label {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            text-align: center;
        }

        input {
            background: #090d16;
            border: 2px solid #1e293b;
            padding: 0.5rem 0.25rem;
            border-radius: 6px;
            color: white;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            width: 100%;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 6px rgba(0, 242, 254, 0.2);
        }

        .selector-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.35rem;
            margin-bottom: 0.35rem;
        }

        .template-selector {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.35rem;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 0.25rem;
        }

        .template-selector::-webkit-scrollbar {
            width: 4px;
        }
        .template-selector::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .template-selector::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 2px;
        }

        .tmpl-btn {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.05);
            color: #94a3b8;
            padding: 0.65rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tmpl-btn .index {
            background: rgba(0,0,0,0.2);
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 0.6rem;
            font-weight: 700;
            margin-right: 5px;
            color: #fff;
        }

        .tmpl-btn .name {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 5px;
        }

        .tmpl-btn:hover {
            background: #27374d;
            color: white;
            border-color: rgba(255,255,255,0.1);
        }

        .tmpl-btn.active {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #090d16;
            font-weight: 700;
            box-shadow: 0 3px 10px rgba(0, 242, 254, 0.25);
            border: none;
        }
        
        .tmpl-btn.active .index {
            background: rgba(0,0,0,0.15);
            color: #090d16;
        }

        /* Panel Bawah: Preview & Actions */
        .panel-preview {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: rgba(19, 28, 46, 0.2);
            padding: 1rem;
            border-radius: 14px;
            border: 1px dashed rgba(255,255,255,0.08);
            width: 100%;
        }

        /* Area Canvas Overlay (Diperkecil menjadi Maksimal 360px agar sejajar lurus) */
        .preview-wrapper {
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1/1;
            background-image: linear-gradient(45deg, #111 25%, transparent 25%), 
                              linear-gradient(-45deg, #111 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #111 75%), 
                              linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #1e293b;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Penampung Skala Otomatis */
        .canvas-scaler {
            width: 360px;
            height: 360px;
            transform-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #overlay-canvas {
            width: 360px;
            height: 360px;
            background: transparent;
            position: relative;
            box-sizing: border-box;
            padding: 20px;
            display: block;
            color: white;
            overflow: hidden;
        }

        .action-buttons {
            display: flex;
            flex-direction: column; /* Tombol bertumpuk agar rapi di lebar 360px */
            gap: 0.5rem;
            width: 100%;
            max-width: 360px;
        }

        .btn {
            width: 100%;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .btn-copy { 
            background: #334155; 
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-download { 
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); 
            color: white;
            box-shadow: 0 3px 10px rgba(34, 197, 94, 0.25);
        }
        .btn:hover { 
            transform: translateY(-1px);
            opacity: 0.95;
        }
        .btn:active {
            transform: translateY(0);
        }

        /* Utilities (Font diatur ulang proporsional dengan canvas 360px) */
        .font-sporty { font-family: 'Oswald', sans-serif; font-weight: 700; text-transform: uppercase; }
        .font-minimal { font-family: 'Inter', sans-serif; font-weight: 800; }
        .font-impact { font-family: 'Anton', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; font-weight: 900; }
    </style>
</head>
<body>

    <header>
        <h1>Running Overlay Generator</h1>
        <p class="subtitle">Desain overlay lari kustom, transparan, instan, & kalkulasi otomatis</p>
    </header>

    <div class="container">
        <div class="panel-control">
            <div class="calculator-grid">
                <div class="input-group">
                    <label>Jarak (KM)</label>
                    <input type="number" id="input-distance" step="0.01" value="10.00" placeholder="10.00">
                </div>
                <div class="input-group">
                    <label>Pace (/KM)</label>
                    <input type="text" id="input-pace" value="05:00" placeholder="MM:SS">
                </div>
                <div class="input-group">
                    <label>Waktu</label>
                    <input type="text" id="input-time" value="00:50:00" placeholder="HH:MM:SS">
                </div>
            </div>

            <div class="input-group" style="margin-top: 0.1rem;">
                <div class="selector-header">
                    <label>Pilih Template Variasi</label>
                    <span style="font-size: 0.65rem; color: #64748b; font-weight: bold;" id="template-count">15 Template Terbuka</span>
                </div>
                <div class="template-selector" id="selector-container"></div>
            </div>
        </div>

        <div class="panel-preview">
            <div class="preview-wrapper" id="preview-wrapper">
                <div class="canvas-scaler" id="canvas-scaler">
                    <div id="overlay-canvas"></div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-copy" onclick="copyOverlay()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    Copy Gambar
                </button>
                <button class="btn btn-download" onclick="downloadOverlay()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download PNG
                </button>
            </div>
        </div>
    </div>

    <script>
        const distanceInput = document.getElementById('input-distance');
        const paceInput = document.getElementById('input-pace');
        const timeInput = document.getElementById('input-time');
        const canvas = document.getElementById('overlay-canvas');
        const scaler = document.getElementById('canvas-scaler');
        const wrapper = document.getElementById('preview-wrapper');
        const selectorContainer = document.getElementById('selector-container');

        let currentTemplate = 1;

        function resizeCanvasPreview() {
            const wrapperWidth = wrapper.clientWidth;
            const scale = wrapperWidth / 360;
            if (scale < 1) {
                scaler.style.transform = `scale(${scale})`;
            } else {
                scaler.style.transform = 'scale(1)';
            }
        }
        window.addEventListener('resize', resizeCanvasPreview);

        function paceToSeconds(paceStr) {
            const parts = paceStr.split(':');
            if(parts.length < 2) return 0;
            return (parseInt(parts[0], 10) * 60) + parseInt(parts[1], 10);
        }

        function secondsToPace(seconds) {
            if(!isFinite(seconds) || seconds <= 0) return "00:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function timeToSeconds(timeStr) {
            const parts = timeStr.split(':');
            if(parts.length === 3) {
                return (parseInt(parts[0],10) * 3600) + (parseInt(parts[1],10) * 60) + parseInt(parts[2],10);
            } else if(parts.length === 2) {
                return (parseInt(parts[0],10) * 60) + parseInt(parts[1],10);
            }
            return 0;
        }

        function secondsToTime(seconds) {
            if(!isFinite(seconds) || seconds <= 0) return "00:00:00";
            const hrs = Math.floor(seconds / 3600);
            const min = Math.floor((seconds % 3600) / 60);
            const sec = Math.floor(seconds % 60);
            return `${String(hrs).padStart(2, '0')}:${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        distanceInput.addEventListener('input', () => {
            const dist = parseFloat(distanceInput.value);
            if (!dist || dist <= 0) return;
            if (paceInput.value && document.activeElement === distanceInput) {
                timeInput.value = secondsToTime(dist * paceToSeconds(paceInput.value));
            }
            updateTemplate();
        });

        paceInput.addEventListener('input', () => {
            const dist = parseFloat(distanceInput.value);
            const pSec = paceToSeconds(paceInput.value);
            if (dist > 0 && pSec > 0 && document.activeElement === paceInput) {
                timeInput.value = secondsToTime(dist * pSec);
            }
            updateTemplate();
        });

        timeInput.addEventListener('input', () => {
            const dist = parseFloat(distanceInput.value);
            const tSec = timeToSeconds(timeInput.value);
            if (dist > 0 && tSec > 0 && document.activeElement === timeInput) {
                paceInput.value = secondsToPace(tSec / dist);
            }
            updateTemplate();
        });

                name: "Sunset Gradient Banner",
                render: (d, p, t) => `
                    <div style="display:flex; width:100%; height:100%; flex-direction:column; justify-content:flex-end;">
                        <div class="font-sporty" style="display:flex; justify-content:space-around; align-items:center; width:100%; height:46px; background:linear-gradient(90deg, #f43f5e, #f97316); border-radius:8px; box-shadow: 0 6px 15px rgba(244,63,94,0.3); padding:0 6px; box-sizing:border-box;">
                            <div style="text-align:center; font-size:18px; font-weight:700; color:#fff;">${d} <span style="font-size:8px; font-family:'Inter'; font-weight:600; opacity:0.8; display:block; margin-top:-2px;">KILOMETER</span></div>
                            <div style="width:1px; background:rgba(255,255,255,0.3); height:20px;"></div>
                            <div style="text-align:center; font-size:18px; font-weight:700; color:#fff;">${p} <span style="font-size:8px; font-family:'Inter'; font-weight:600; opacity:0.8; display:block; margin-top:-2px;">AVG PACE</span></div>
                            <div style="width:1px; background:rgba(255,255,255,0.3); height:20px;"></div>
                            <div style="text-align:center; font-size:18px; font-weight:700; color:#fff;">${t} <span style="font-size:8px; font-family:'Inter'; font-weight:600; opacity:0.8; display:block; margin-top:-2px;">TOTAL TIME</span></div>
                        </div>
                    </div>`
            },
            {
                id: 10,
                name: "Ultra Heritage Box",
                render: (d, p, t) => `
                    <div class="font-sporty" style="display:flex; flex-direction:column; justify-content:flex-end; width:100%; height:100%; box-sizing:border-box; position:relative;">
                        <div class="font-impact" style="font-size:58px; line-height:0.75; opacity:0.06; position:absolute; top:10px; left:0; width:100%; letter-spacing:2px; pointer-events:none;">ATHLETE DEPOT</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; border-top:2px solid #fff; padding-top:8px; width:100%;">
                            <span style="font-size:17px; letter-spacing:0.5px; color:#fff;">DIST: ${d} KM</span>
                            <span style="font-size:17px; color:#facc15; letter-spacing:0.5px;">PACE: ${p}</span>
                            <span style="font-size:17px; letter-spacing:0.5px; color:#fff;">TIME: ${t}</span>
                        </div>
                    </div>`
            },
            {
                id: 11,
                name: "Marathon Finisher Badge",
                render: (d, p, t) => `
                    <div style="display:flex; width:100%; height:100%; justify-content:center; align-items:center;">
                        <div class="font-montserrat" style="background: rgba(0,0,0,0.85); border: 2px solid #eab308; padding: 12px; border-radius: 50%; width: 170px; height: 170px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.7); box-sizing:border-box;">
                            <div style="font-size: 8px; color: #eab308; letter-spacing: 2px; font-weight:700; margin-bottom:1px;">FINISHER</div>
                            <div style="font-size: 26px; line-height: 0.95; margin-bottom: 2px; color:#fff;">${d}</div>
                            <div style="font-size: 9px; color: #94a3b8; letter-spacing: 1px; font-weight:400; margin-bottom: 6px;">KILOMETERS</div>
                            <div style="font-family:'Oswald'; font-size: 14px; color: #eab308; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 3px; width:80%;">⏱️ ${t}</div>
                            <div style="font-family:'Oswald'; font-size: 11px; color: #fff; opacity:0.8;">Pace ${p}</div>
                        </div>
                    </div>`
            },
            {
                id: 12,
                name: "Volt Speed Lines",
                render: (d, p, t) => `
                    <div class="font-sporty" style="display: flex; flex-direction: column; justify-content: flex-end; width:100%; height:100%; box-sizing:border-box;">
                        <div style="background: #ccff00; color: #000; padding: 8px 14px; transform: skewX(-12deg); width: fit-content; display: flex; gap: 14px; align-items: baseline; box-shadow: 5px 5px 0px rgba(0,0,0,0.3); margin-bottom:4px; box-sizing:border-box;">
                            <span style="font-size: 26px; font-weight: 900; line-height:1;">${d} <span style="font-size: 11px; font-family:'Inter'; font-weight:800;">KM</span></span>
                            <span style="font-size: 16px; opacity: 0.8;">PACE ${p}</span>
                            <span style="font-size: 16px; font-weight: 500;">TIME ${t}</span>
                        </div>
                    </div>`
            },
            {
                id: 13,
                name: "Futuristic HUD Target",
                render: (d, p, t) => `
                    <div class="font-sporty" style="width:100%; height:100%; display:flex; flex-direction:column; justify-content:space-between; padding:2px; box-sizing:border-box;">
                        <div style="display:flex; justify-content:space-between; font-size:10px; opacity:0.8; border-left:3px solid #00f2fe; padding-left:5px; height:14px; align-items:center; color:#fff;">
                            <span>HUD_METRIC_SYS v2.6</span>
                            <span style="color:#00f2fe;">● ONLINE</span>
                        </div>
                        <div style="display: flex; gap: 24px; align-items: flex-end; margin-bottom:4px;">
                            <div><div style="font-size: 38px; line-height: 1; color: #fff; font-weight:900;">${d}</div><div style="font-family:'Inter'; font-size:8px; opacity:0.5; color:#fff;">DIST_KM</div></div>
                            <div><div style="font-size: 22px; line-height: 1; color: #00f2fe;">${p}</div><div style="font-family:'Inter'; font-size:8px; opacity:0.5;">P_TRACK</div></div>
                            <div><div style="font-size: 22px; line-height: 1; color: #fff;">${t}</div><div style="font-family:'Inter'; font-size:8px; opacity:0.5; color:#fff;">TIME_CLK</div></div>
                        </div>
                    </div>`
            },
            {
                id: 14,
                name: "Minimalist Crosshair (Corners)",
                render: (d, p, t) => `
                    <div class="font-minimal" style="width:100%; height:100%; position:relative; display:flex; flex-direction:column; justify-content:space-between; box-sizing:border-box;">
                        <div style="display:flex; justify-content:space-between; width:100%;">
                            <div style="border-top:2px solid white; border-left:2px solid white; padding: 5px 0 0 5px; font-size:14px; color:#fff;" class="font-sporty">${d} KM</div>
                            <div style="border-top:2px solid white; border-right:2px solid white; padding: 5px 5px 0 0; font-size:14px; color:#fff;" class="font-sporty">${t}</div>
                        </div>
                        <div style="display:flex; justify-content:center; width:100%; margin-bottom:0px;">
                            <div style="background:black; color:white; border:1px solid rgba(255,255,255,0.3); padding:3px 10px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; border-radius:12px;">⏱️ Pace ${p}</div>
                        </div>
                        <div style="display:flex; justify-content:space-between; width:100%; position:absolute; bottom:0; left:0;">
                            <div style="border-bottom:2px solid white; border-left:2px solid white; width:16px; height:16px;"></div>
                            <div style="border-bottom:2px solid white; border-right:2px solid white; width:16px; height:16px;"></div>
                        </div>
                    </div>`
            },
            {
                id: 15,
                name: "Monochrome Editorial Bold",
                render: (d, p, t) => `
                    <div class="font-montserrat" style="display:flex; flex-direction:column; justify-content:flex-end; width:100%; height:100%; gap:2px; padding-bottom:4px; box-sizing:border-box;">
                        <div style="font-size:48px; font-weight:900; line-height:0.8; letter-spacing:-2px; color:#fff; text-shadow:1px 1px 0px #000;">${d}</div>
                        <div style="display:flex; gap:10px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; border-top:2px solid #fff; padding-top:4px; width:fit-content; min-width:180px; color:#fff;">
                            <span>PACE ${p}</span>
                            <span style="color:rgba(255,255,255,0.5);">/</span>
                            <span>TIME ${t}</span>
                        </div>
                    </div>`
            }
        ];

        function updateTemplate() {
            const d = parseFloat(distanceInput.value || 0).toFixed(2);
            const p = paceInput.value || '00:00';
            const t = timeInput.value || '00:00:00';
            
            const matchedTemplate = templateLibrary.find(t => t.id === currentTemplate);
            if (matchedTemplate) {
                canvas.innerHTML = matchedTemplate.render(d, p, t);
            }
            resizeCanvasPreview();
        }

        function initSelectors() {
            selectorContainer.innerHTML = "";
            templateLibrary.forEach((template) => {
                const btn = document.createElement('button');
                btn.className = `tmpl-btn ${template.id === currentTemplate ? 'active' : ''}`;
                btn.innerHTML = `
                    <span class="index">#${String(template.id).padStart(2, '0')}</span>
                    <span class="name">${template.name}</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"></polyline></svg>
                `;
                btn.onclick = () => {
                    document.querySelectorAll('.tmpl-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTemplate = template.id;
                    updateTemplate();
                };
                selectorContainer.appendChild(btn);
            });
            document.getElementById('template-count').innerText = `${templateLibrary.length} Template Siap Pakai`;
        }

        function downloadOverlay() {
            html2canvas(canvas, { backgroundColor: null, scale: 3 }).then(resultCanvas => {
                const link = document.createElement('a');
                const matched = templateLibrary.find(t => t.id === currentTemplate);
                const safeName = matched ? matched.name.toLowerCase().replace(/[^a-z0-9]/g, '-') : 'overlay';
                link.download = `run-overlay-${safeName}.png`;
                link.href = resultCanvas.toDataURL('image/png');
                link.click();
            });
        }

        function copyOverlay() {
            html2canvas(canvas, { backgroundColor: null, scale: 2 }).then(resultCanvas => {
                resultCanvas.toBlob(blob => {
                    if (!blob) {
                        alert('Gagal membuat kloning grafis.');
                        return;
                    }
                    navigator.clipboard.write([
                        new ClipboardItem({ "image/png": blob })
                    ]).then(() => {
                        alert('Overlay transparan "' + templateLibrary.find(t => t.id === currentTemplate).name + '" berhasil disalin ke clipboard! Siap di-paste langsung (Ctrl+V) ke Canva / Photoshop / Stories.');
                    }).catch(err => {
                        alert('Fitur Copy terkendala permission browser Anda. Silakan klik tombol Download PNG.');
                    });
                });
            });
        }

        initSelectors();
        updateTemplate();
        setTimeout(resizeCanvasPreview, 100);
    </script>
</body>
</html>
