<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner Overlay Generator</title>
    <!-- Google Fonts untuk kesan Sporty, Rapi & Minimalis -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;1,700&family=Montserrat:ital,wght@0,400;0,700;0,900;1,700;1,900&family=Share+Tech+Mono&family=Teko:wght@500;700&family=Orbitron:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet">
    
    <!-- html2canvas untuk unduh gambar transparan -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-color: #09090b; 
            --card-bg: #18181b; 
            --accent-color: #3b82f6; 
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --border-color: #27272a;
            /* Variabel dinamis untuk skala font semua template */
            --font-scale: 1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 400px 1fr;
            }
        }

        /* Panel Kontrol Input */
        .control-panel {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }

        .input-group input[type="number"],
        .input-group input[type="text"] {
            background-color: #09090b;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
        }

        /* Slider Styling */
        .font-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #27272a;
            border-radius: 3px;
            outline: none;
            margin: 10px 0;
        }
        .font-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .font-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .btn-copy { background-color: #27272a; color: var(--text-main); border: 1px solid #3f3f46; }
        .btn-download { background-color: #2563eb; color: white; }
        .btn:hover { opacity: 0.9; }

        /* Preview Area */
        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Kotak Preview Frame */
        .live-preview-box {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            background-color: #111;
            background-image: linear-gradient(45deg, #141414 25%, transparent 25%), 
                              linear-gradient(-45deg, #141414 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #141414 75%), 
                              linear-gradient(-45deg, transparent 75%, #141414 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Kotak Capture Canvas Transparan */
        #overlay-capture {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: transparent;
            display: flex;
            padding: 30px; 
            box-sizing: border-box;
        }

        /* Grid Pemilihan Nomor Template */
        .template-selector {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .template-selector h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .template-item {
            background-color: #27272a;
            padding: 10px 0;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.2s;
            color: #a1a1aa;
        }

        .template-item.active {
            background-color: var(--accent-color);
            color: #fff;
        }

        /* ----------------====================---------------- */
        /* CSS CORE BERBAGAI MACAM TEMPLATE                     */
        /* ----------------====================---------------- */
        
        .ov-data { font-weight: bold; }
        .ov-label { text-transform: uppercase; opacity: 0.8; }

        /* Penerapan Pengali Font-Scale secara Global pada Elemen Kunci */
        #overlay-capture div, 
        #overlay-capture span, 
        #overlay-capture .ov-data, 
        #overlay-capture .ov-label {
            font-size: calc(100% * var(--font-scale)) !important;
        }

        /* 1. Neon Grid */
        .tpl-neon-grid { align-items: flex-end; justify-content: space-between; font-family: 'Share Tech Mono', monospace; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        .tpl-neon-grid .ov-data { font-size: calc(1rem * var(--font-scale)) !important; }
        
        /* 2. Apex Bold */
        .tpl-apex-bold { align-items: center; justify-content: center; flex-direction: column; gap: 10px; font-family: 'Barlow Condensed', sans-serif; color: #fff; text-transform: uppercase; background: rgba(0,0,0,0.6); height: fit-content; margin-top: auto; width: 100%; left: 0 !important; }
        .tpl-apex-bold .ov-data { font-size: calc(2.2rem * var(--font-scale)) !important; italic: true; color: #facc15; }

        /* 3. Minimal Corner */
        .tpl-minimal-corner { flex-direction: column; justify-content: space-between; font-family: 'Montserrat', sans-serif; color: #fff; }
        .tpl-minimal-corner .top .ov-data { font-size: calc(2rem * var(--font-scale)) !important; }
        
        /* 4. Speedster */
        .tpl-speedster { align-items: flex-start; justify-content: flex-end; flex-direction: column; font-family: 'Teko', sans-serif; color: #ec4899; }
        .tpl-speedster .ov-data { font-size: calc(3rem * var(--font-scale)) !important; line-height: 0.9; }

        /* 5. Clean Bottom Bar */
        .tpl-clean-bottom { align-items: flex-end; justify-content: space-around; width: 100%; left: 0 !important; background: rgba(255,255,255,0.95); color: #000; height: 75px; margin-top: auto; font-family: 'Montserrat', sans-serif; }
        .tpl-clean-bottom .ov-data { font-size: calc(1.2rem * var(--font-scale)) !important; font-weight: 900; }

        /* 6. Dark Mode Badge */
        .tpl-dark-badge { flex-direction: column; gap: 10px; justify-content: center; font-family: 'Share Tech Mono', sans-serif;}
        .tpl-dark-badge .box { background: rgba(24, 24, 27, 0.9); padding: 10px 16px; border-left: 4px solid #f97316; border-radius: 0 6px 6px 0;}

        /* 7. Cyber Runner */
        .tpl-cyber { align-items: flex-end; justify-content: space-between; font-family: 'Share Tech Mono', monospace; color: #e11d48; }
        .tpl-cyber .ov-data { font-size: calc(1.8rem * var(--font-scale)) !important; border-bottom: 2px solid #e11d48; }

        /* 8. Split Horizon */
        .tpl-split { flex-direction: column; justify-content: space-between; height: 100%; width: 100%; font-family: 'Barlow Condensed', sans-serif;}
        .tpl-split .top { display: flex; justify-content: space-between; }
        .tpl-split .bottom { text-align: center; color: #22c55e; font-weight: 900; line-height: 1; }
        .tpl-split .bottom .ov-data { font-size: calc(3.5rem * var(--font-scale)) !important; }

        /* 9. Chrono Minimal */
        .tpl-chrono { flex-direction: column; align-items: flex-end; justify-content: flex-start; font-family: 'Montserrat', sans-serif; text-align: right; color: #fff;}
        .tpl-chrono .ov-data { font-size: calc(2rem * var(--font-scale)) !important; font-weight: 300; }

        /* 10. Bolt Dash */
        .tpl-bolt { align-items: flex-end; justify-content: space-between; font-family: 'Teko', sans-serif; color: #facc15; width: 100%; gap: 10px;}
        .tpl-bolt .ov-data { font-size: calc(2rem * var(--font-scale)) !important; line-height: 1; margin-top: 1px;}

        /* 11. Monospace Stack */
        .tpl-mono-stack { flex-direction: column; justify-content: flex-end; gap: 8px; font-family: 'Share Tech Mono', monospace; }

        /* 12. Elegant Slate */
        .tpl-elegant { align-items: flex-end; justify-content: space-between; font-family: 'Montserrat', sans-serif; width: 100%; left:0!important; padding: 25px 35px!important; background: linear-gradient(transparent, rgba(0,0,0,0.85)); margin-top: auto;}

        /* 13. Modernist White */
        .tpl-modernist { flex-direction: row; justify-content: space-between; align-items: flex-start; font-family: 'Montserrat', sans-serif; color: #fff; width: 100%; }
        .tpl-modernist .box { background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); padding: 10px; border-radius: 6px; text-align: center; flex: 1; margin: 0 4px; }

        /* 14. Aero Dynamic */
        .tpl-aero { align-items: flex-end; justify-content: space-between; font-family: 'Teko', sans-serif; color: #06b6d4; text-transform: uppercase; width: 100%; gap: 10px;}
        .tpl-aero .ov-data { font-size: calc(1.9rem * var(--font-scale)) !important; transform: skewX(-6deg); display: inline-block; line-height: 1;}

        /* 15. Tokyo Race */
        .tpl-tokyo { flex-direction: column; justify-content: space-between; font-family: 'Share Tech Mono', monospace; color: #fff; }
        .tpl-tokyo .border-box { border: 2px solid #fff; padding: 10px; width: fit-content; }

        /* 16. Alpha Strike */
        .tpl-alpha { align-items: center; justify-content: space-between; font-family: 'Barlow Condensed', sans-serif; width:100%; margin-top: auto; background: #fff; color: #000; padding: 12px 20px !important; left:0!important;}
        .tpl-alpha .ov-data { font-size: calc(1.8rem * var(--font-scale)) !important; font-weight: 900; }

        /* 17. Central Focus */
        .tpl-central { flex-direction: column; justify-content: center; align-items: center; width:100%; height:100%; font-family: 'Montserrat', sans-serif; gap: 20px;}
        .tpl-central .main-circle { border: 3px solid #3b82f6; width: 125px; height: 125px; border-radius: 50%; display:flex; flex-direction:column; justify-content:center; align-items:center; background: rgba(0,0,0,0.5); }
        .tpl-central .main-circle .ov-data { font-size: calc(2.2rem * var(--font-scale)) !important; line-height:1 }

        /* 18. Military Squad */
        .tpl-military { align-items: flex-start; justify-content: flex-end; flex-direction: column; font-family: 'Barlow Condensed', sans-serif; color: #a3e635;}
        .tpl-military .box { border-left: 4px solid #a3e635; padding-left: 12px; }
        .tpl-military .box .ov-data { font-size: calc(2.8rem * var(--font-scale)) !important; line-height:0.9; }

        /* 19. Neon Pulse */
        .tpl-neon-pulse { align-items: flex-end; justify-content: space-between; font-family: 'Teko', sans-serif; color: #c084fc; text-shadow: 0 0 6px #a855f7; width: 100%; text-align: center;}
        .tpl-neon-pulse > div { flex: 1; }
        .tpl-neon-pulse .ov-data { font-size: calc(2rem * var(--font-scale)) !important; line-height: 1; }

        /* 20. Ultra Marathon Neon */
        .tpl-ultra-neon { align-items: flex-end; justify-content: space-between; font-family: 'Orbitron', sans-serif; color: #adff2f; width:100%; font-weight: 900; }
        .tpl-ultra-neon .ov-data { font-size: calc(1.7rem * var(--font-scale)) !important; letter-spacing: -1px; text-shadow: 0 0 8px rgba(173,255,47,0.6); }
        .tpl-ultra-neon .ov-label { font-size: calc(0.7rem * var(--font-scale)) !important; color: #fff; opacity: 0.6; font-weight:400; }

        /* 21. Pro Athletics Brand */
        .tpl-pro-brand { flex-direction: column; justify-content: flex-end; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: #fff; gap: 4px; }
        .tpl-pro-brand .row { display: flex; align-items: baseline; gap: 8px; background: rgba(0,0,0,0.75); padding: 2px 10px; width: fit-content; border-right: 5px solid #2563eb; }
        .tpl-pro-brand .ov-data { font-size: calc(1.9rem * var(--font-scale)) !important; }
        .tpl-pro-brand .ov-label { font-size: calc(0.8rem * var(--font-scale)) !important; color: #94a3b8; }

        /* 22. Smart Watch Face Minimal */
        .tpl-watch-face { flex-direction: column; align-items: center; justify-content: center; height:100%; width:100%; font-family: 'Montserrat', sans-serif; text-align: center; color: #fff; }
        .tpl-watch-face .main-dist { font-size: calc(3.6rem * var(--font-scale)) !important; font-weight: 900; line-height: 1; color: #22c55e; }
        .tpl-watch-face .sub-stats { display: flex; gap: 20px; margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 5px; }
        .tpl-watch-face .sub-stats .ov-data { font-size: calc(1.1rem * var(--font-scale)) !important; }

        /* 23. Cyberpunk Grid Box */
        .tpl-cyber-box { align-items: flex-end; justify-content: space-between; font-family: 'Share Tech Mono', monospace; width: 100%; gap: 10px; }
        .tpl-cyber-box .card { background: rgba(17, 24, 39, 0.85); border: 1px dashed #e11d48; padding: 8px; flex: 1; text-align: center; color: #fff; }
        .tpl-cyber-box .ov-data { font-size: calc(1.3rem * var(--font-scale)) !important; color: #38bdf8; }
        .tpl-cyber-box .ov-label { font-size: calc(0.65rem * var(--font-scale)) !important; color: #64748b; }

        /* System Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <header>
        <h1>Runner Overlay Generator</h1>
    </header>

    <div class="container">
        
        <!-- Panel Input -->
        <div class="control-panel">
            <div class="input-group">
                <label for="distance">Distance (KM)</label>
                <input type="number" id="distance" step="0.01" value="5.00" placeholder="0.00">
            </div>
            <div class="input-group">
                <label for="pace">Pace (MM:SS)</label>
                <input type="text" id="pace" value="05:30" placeholder="00:00">
            </div>
            <div class="input-group">
                <label for="time">Time (HH:MM:SS atau gaya h m s)</label>
                <input type="text" id="time" value="00:27:30" placeholder="Contoh: 01:24:40 atau 1h 24m 40s">
            </div>

            <!-- Font Size Controller -->
            <div class="input-group">
                <label for="font-size-slider">
                    Font Size Overlay 
                    <span id="font-size-val" style="color: var(--accent-color)">100%</span>
                </label>
                <input type="range" id="font-size-slider" class="font-slider" min="40" max="160" value="100">
            </div>

            <!-- Grid Pilihan Hanya Nomor -->
            <div class="template-selector">
                <h3>Pilih Template (1 - 23)</h3>
                <div class="template-grid" id="template-list"></div>
            </div>

            <!-- Tombol Aksi -->
            <div class="action-btns">
                <button class="btn btn-copy" onclick="copyOverlay()">Copy</button>
                <button class="btn btn-download" onclick="downloadOverlay()">Download</button>
            </div>
        </div>

        <!-- Live Preview Area -->
        <div class="preview-container">
            <div class="live-preview-box" id="preview-box">
                <div id="overlay-capture" class="tpl-neon-grid"></div>
            </div>
            <span style="font-size: 0.75rem; color: var(--text-muted); text-align: center;">
                *Latar berpetak (checkerboard) hanya indikator area transparan. Hasil akhir murni transparan PNG.
            </span>
        </div>

    </div>

    <div class="toast" id="toast">Berhasil disalin!</div>

    <script>
        // Array template setelah menghapus 'street' dan 'velocity'
        const templates = [
            'neon-grid', 'apex-bold', 'minimal-corner', 'speedster', 'clean-bottom',
            'dark-badge', 'cyber', 'split', 'chrono', 'bolt',
            'mono-stack', 'elegant', 'modernist', 'aero', 'tokyo', 
            'alpha', 'central', 'military', 'neon-pulse', 'ultra-neon', 
            'pro-brand', 'watch-face', 'cyber-box'
        ];

        let activeTemplateId = 'neon-grid';

        const distanceInput = document.getElementById('distance');
        const paceInput = document.getElementById('pace');
        const timeInput = document.getElementById('time');
        const containerCapture = document.getElementById('overlay-capture');
        const templateGrid = document.getElementById('template-list');
        
        const fontSizeSlider = document.getElementById('font-size-slider');
        const fontSizeVal = document.getElementById('font-size-val');

        function timeToSeconds(timeStr) {
            let str = timeStr.toLowerCase().trim();
            if (str.includes('h') || str.includes('m') || str.includes('s')) {
                let hrs = 0, mins = 0, secs = 0;
                let hMatch = str.match(/(\d+)\s*h/);
                let mMatch = str.match(/(\d+)\s*m/);
                let sMatch = str.match(/(\d+)\s*s/);
                if (hMatch) hrs = parseInt(hMatch[1]);
                if (mMatch) mins = parseInt(mMatch[1]);
                if (sMatch) secs = parseInt(sMatch[1]);
                return (hrs * 3600) + (mins * 60) + secs;
            }
            const parts = str.split(':').map(Number);
            if (parts.length === 3) return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
            if (parts.length === 2) return (parts[0] * 60) + parts[1];
            return 0;
        }

        function secondsToTimeInputFormat(totalSeconds) {
            const hrs = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = Math.round(totalSeconds % 60);
            return [
                hrs.toString().padStart(2, '0'),
                mins.toString().padStart(2, '0'),
                secs.toString().padStart(2, '0')
            ].join(':');
        }

        function formatDisplayTime(totalSeconds) {
            if (totalSeconds <= 0) return '00s';
            const hrs = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = Math.round(totalSeconds % 60);
            
            let result = [];
            if (hrs > 0) result.push(`${hrs}h`);
            if (mins > 0 || hrs > 0) result.push(`${mins}m`);
            if (secs > 0 || (hrs === 0 && mins === 0)) result.push(`${secs}s`);
            
            return result.join(' ');
        }

        function secondsToPace(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = Math.round(totalSeconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        distanceInput.addEventListener('input', () => calculateMetrics('distance'));
        paceInput.addEventListener('input', () => calculateMetrics('pace'));
        timeInput.addEventListener('input', () => calculateMetrics('time'));
        
        fontSizeSlider.addEventListener('input', () => {
            const scaleValue = fontSizeSlider.value;
            fontSizeVal.textContent = scaleValue + '%';
            document.documentElement.style.setProperty('--font-scale', scaleValue / 100);
        });

        function calculateMetrics(triggerSource) {
            const dist = parseFloat(distanceInput.value);
            if (!dist || dist <= 0) return;

            if (triggerSource === 'distance' || triggerSource === 'pace') {
                const paceSecs = timeToSeconds(paceInput.value);
                if (paceSecs > 0) {
                    timeInput.value = secondsToTimeInputFormat(paceSecs * dist);
                }
            } else if (triggerSource === 'time') {
                const timeSecs = timeToSeconds(timeInput.value);
                if (timeSecs > 0) {
                    paceInput.value = secondsToPace(timeSecs / dist);
                }
            }
            renderTemplate();
        }

        function initTemplateSelector() {
            templates.forEach((tplId, index) => {
                const item = document.createElement('div');
                item.className = `template-item ${tplId === activeTemplateId ? 'active' : ''}`;
                item.textContent = index + 1;
                item.onclick = () => {
                    document.querySelectorAll('.template-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    activeTemplateId = tplId;
                    renderTemplate();
                };
                templateGrid.appendChild(item);
            });
        }

        function renderTemplate() {
            const dist = distanceInput.value || '0.00';
            const pace = paceInput.value || '00:00';
            
            const rawSeconds = timeToSeconds(timeInput.value);
            const displayTime = formatDisplayTime(rawSeconds);

            containerCapture.className = `tpl-${activeTemplateId}`;

            switch(activeTemplateId) {
                case 'neon-grid':
                case 'cyber':
                case 'bolt':
                case 'aero':
                case 'neon-pulse':
                case 'ultra-neon':
                    containerCapture.innerHTML = `
                        <div><div class="ov-label">Distance</div><div class="ov-data">${dist} KM</div></div>
                        <div><div class="ov-label">Pace</div><div class="ov-data">${pace}</div></div>
                        <div><div class="ov-label">Time</div><div class="ov-data">${displayTime}</div></div>
                    `;
                    break;
                case 'apex-bold':
                    containerCapture.innerHTML = `
                        <div style="display:flex; gap: 20px;">

                case 'clean-bottom':

                        <div style="text-align:center"><div class="ov-label">Pace</div><div class="ov-data">${pace}</div></div>
                        <div style="text-align:center"><div class="ov-label">Time</div><div class="ov-data">${displayTime}</div></div>

                    break;
                case 'dark-badge':

                        <div class="box"><span class="ov-label">DIST: </span><span class="ov-data">${dist} KM</span></div>
                        <div class="box"><span class="ov-label">PACE: </span><span class="ov-data">${pace}</span></div>

        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function downloadOverlay() {
            html2canvas(containerCapture, { backgroundColor: null, scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `overlay-${activeTemplateId}-${distanceInput.value}k.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function copyOverlay() {
            html2canvas(containerCapture, { backgroundColor: null, scale: 2 }).then(canvas => {
                canvas.toBlob(blob => {
                    navigator.clipboard.write([
                        new ClipboardItem({ "image/png": blob })
                    ]).then(() => {
                        showToast("Overlay disalin ke clipboard!");
                    }).catch(err => {
                        showToast("Gagal menyalin.");
                    });
                }, 'image/png');
            });
        }

        initTemplateSelector();
        renderTemplate();
    </script>
</body>
