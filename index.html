<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner Overlay Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;1,700&family=Montserrat:wght@400;700;900&family=Share+Tech+Mono&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-color: #09090b; 
            --card-bg: #18181b; 
            --accent-color: #3b82f6; 
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --border-color: #27272a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 400px 1fr;
            }
        }

        /* Panel Kontrol Input */
        .control-panel {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .input-group input {
            background-color: #09090b;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .btn-copy { background-color: #27272a; color: var(--text-main); border: 1px solid #3f3f46; }
        .btn-download { background-color: #2563eb; color: white; }
        .btn:hover { opacity: 0.9; }

        /* Preview Area */
        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Kotak Preview Frame */
        .live-preview-box {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            background-color: #111;
            background-image: linear-gradient(45deg, #141414 25%, transparent 25%), 
                              linear-gradient(-45deg, #141414 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #141414 75%), 
                              linear-gradient(-45deg, transparent 75%, #141414 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Kotak Capture Canvas Transparan */
        #overlay-capture {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: transparent;
            display: flex;
            padding: 30px; 
            box-sizing: border-box;
        }

        /* Grid Pemilihan Nomor Template */
        .template-selector {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .template-selector h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .template-item {
            background-color: #27272a;
            padding: 10px 0;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.2s;
            color: #a1a1aa;
        }

        .template-item.active {
            background-color: var(--accent-color);
            color: #fff;
        }

        /* ----------------====================---------------- */
        /* CSS CORE BERBAGAI MACAM TEMPLATE                     */
        /* ----------------====================---------------- */
        
        .ov-data { font-weight: bold; }
        .ov-label { text-transform: uppercase; opacity: 0.8; }

        /* 1. Neon Grid */
        .tpl-neon-grid { align-items: flex-end; justify-content: space-between; font-family: 'Share Tech Mono', monospace; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        
        /* 2. Apex Bold */
        .tpl-apex-bold { align-items: center; justify-content: center; flex-direction: column; gap: 10px; font-family: 'Barlow Condensed', sans-serif; color: #fff; text-transform: uppercase; background: rgba(0,0,0,0.6); height: fit-content; margin-top: auto; width: 100%; left: 0 !important; }
        .tpl-apex-bold .ov-data { font-size: 2.2rem; italic: true; color: #facc15; }

        /* 3. Minimal Corner */
        .tpl-minimal-corner { flex-direction: column; justify-content: space-between; font-family: 'Montserrat', sans-serif; color: #fff; }
        
        /* 4. Speedster */
        .tpl-speedster { align-items: flex-start; justify-content: flex-end; flex-direction: column; font-family: 'Teko', sans-serif; color: #ec4899; font-size: 1.5rem; }
        .tpl-speedster .ov-data { font-size: 3rem; line-height: 0.9; }

        /* 5. Clean Bottom Bar */
        .tpl-clean-bottom { align-items: flex-end; justify-content: space-around; width: 100%; left: 0 !important; background: rgba(255,255,255,0.95); color: #000; height: 75px; margin-top: auto; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; }
        .tpl-clean-bottom .ov-data { font-size: 1.2rem; font-weight: 900; }

        /* 6. Dark Mode Badge */
        .tpl-dark-badge { flex-direction: column; gap: 10px; justify-content: center; font-family: 'Share Tech Mono', sans-serif;}
        .tpl-dark-badge .box { background: rgba(24, 24, 27, 0.9); padding: 10px 16px; border-left: 4px solid #f97316; border-radius: 0 6px 6px 0;}

        /* 7. Cyber Runner */
        .tpl-cyber { align-items: flex-end; justify-content: space-between; font-family: 'Share Tech Mono', monospace; color: #e11d48; }
        .tpl-cyber .ov-data { font-size: 1.8rem; border-bottom: 2px solid #e11d48; }

        /* 8. Split Horizon */
        .tpl-split { flex-direction: column; justify-content: space-between; height: 100%; width: 100%; font-family: 'Barlow Condensed', sans-serif;}
        .tpl-split .top { display: flex; justify-content: space-between; font-size: 1.4rem;}
        .tpl-split .bottom { font-size: 3.5rem; text-align: center; color: #22c55e; font-weight: 900; line-height: 1; }

        /* 9. Chrono Minimal */
        .tpl-chrono { flex-direction: column; align-items: flex-end; justify-content: flex-start; font-family: 'Montserrat', sans-serif; text-align: right; color: #fff;}
        .tpl-chrono .ov-data { font-size: 2rem; font-weight: 300; }

        /* 10. Bolt Dash [UPDATED - Ukuran Font Diperkecil & Spacing Aman] */
        .tpl-bolt { align-items: flex-end; justify-content: space-between; font-family: 'Teko', sans-serif; color: #facc15; font-size: 1.1rem; width: 100%; gap: 10px;}
        .tpl-bolt .ov-data { font-size: 2rem; line-height: 1; margin-top: 1px;}
        .tpl-bolt .ov-label { font-size: 1rem; }

        /* 11. Monospace Stack */
        .tpl-mono-stack { flex-direction: column; justify-content: flex-end; gap: 8px; font-family: 'Share Tech Mono', monospace; }

        /* 12. Elegant Slate */
        .tpl-elegant { align-items: flex-end; justify-content: space-between; font-family: 'Montserrat', sans-serif; width: 100%; left:0!important; padding: 25px 35px!important; background: linear-gradient(transparent, rgba(0,0,0,0.85)); margin-top: auto;}
        
        /* 13. Street Athletics */
        .tpl-street { flex-direction: column; justify-content: flex-end; font-family: 'Barlow Condensed', sans-serif; font-style: italic; }
        .tpl-street .ov-data { font-size: 3.2rem; line-height: 0.85; -webkit-text-stroke: 1px #fff; color: transparent; }
        .tpl-street .main-stat .ov-data { color: #fff; -webkit-text-stroke: none; }

        /* 14. Modernist White */
        .tpl-modernist { flex-direction: row; justify-content: space-between; align-items: flex-start; font-family: 'Montserrat', sans-serif; color: #fff; width: 100%; }
        .tpl-modernist .box { background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); padding: 10px; border-radius: 6px; text-align: center; flex: 1; margin: 0 4px; }

        /* 15. Aero Dynamic [UPDATED - Ukuran Font Diperkecil & Skew Lebih Aman] */
        .tpl-aero { align-items: flex-end; justify-content: space-between; font-family: 'Teko', sans-serif; color: #06b6d4; text-transform: uppercase; width: 100%; gap: 10px;}
        .tpl-aero .ov-data { font-size: 1.9rem; transform: skewX(-6deg); display: inline-block; line-height: 1;}
        .tpl-aero .ov-label { font-size: 0.95rem; letter-spacing: 0.5px;}

        /* 16. Tokyo Race */
        .tpl-tokyo { flex-direction: column; justify-content: space-between; font-family: 'Share Tech Mono', monospace; color: #fff; }
        .tpl-tokyo .border-box { border: 2px solid #fff; padding: 10px; width: fit-content; }

        /* 17. Alpha Strike */
        .tpl-alpha { align-items: center; justify-content: space-between; font-family: 'Barlow Condensed', sans-serif; width:100%; margin-top: auto; background: #fff; color: #000; padding: 12px 20px !important; left:0!important;}
        .tpl-alpha .ov-data { font-size: 1.8rem; font-weight: 900; }

        /* 18. Central Focus */
        .tpl-central { flex-direction: column; justify-content: center; align-items: center; width:100%; height:100%; font-family: 'Montserrat', sans-serif; gap: 20px;}
        .tpl-central .main-circle { border: 3px solid #3b82f6; width: 125px; height: 125px; border-radius: 50%; display:flex; flex-direction:column; justify-content:center; align-items:center; background: rgba(0,0,0,0.5); }

        /* 19. Military Squad */
        .tpl-military { align-items: flex-start; justify-content: flex-end; flex-direction: column; font-family: 'Barlow Condensed', sans-serif; color: #a3e635;}
        .tpl-military .box { border-left: 4px solid #a3e635; padding-left: 12px; }

        /* 20. Neon Pulse [UPDATED - Ukuran Font Diperkecil Serta Spacing Proporsional] */
        .tpl-neon-pulse { align-items: flex-end; justify-content: space-between; font-family: 'Teko', sans-serif; color: #c084fc; text-shadow: 0 0 6px #a855f7; width: 100%; text-align: center;}
        .tpl-neon-pulse > div { flex: 1; }
        .tpl-neon-pulse .ov-data { font-size: 2rem; line-height: 1; }
        .tpl-neon-pulse .ov-label { font-size: 0.95rem; }

        /* System Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <header>
        <h1>Runner Overlay Generator</h1>
    </header>

    <div class="container">
        
        <div class="control-panel">
            <div class="input-group">
                <label for="distance">Distance (KM)</label>
                <input type="number" id="distance" step="0.01" value="5.00" placeholder="0.00">
            </div>
            <div class="input-group">
                <label for="pace">Pace (MM:SS)</label>
                <input type="text" id="pace" value="05:30" placeholder="00:00">
            </div>
            <div class="input-group">
                <label for="time">Time (HH:MM:SS)</label>
                <input type="text" id="time" value="00:27:30" placeholder="00:00:00">
            </div>

            <div class="template-selector">
                <h3>Pilih Template</h3>
                <div class="template-grid" id="template-list"></div>
            </div>

            <div class="action-btns">
                <button class="btn btn-copy" onclick="copyOverlay()">Copy</button>
                <button class="btn btn-download" onclick="downloadOverlay()">Download</button>
            </div>
        </div>

        <div class="preview-container">
            <div class="live-preview-box" id="preview-box">
                <div id="overlay-capture" class="tpl-neon-grid"></div>
            </div>
            <span style="font-size: 0.75rem; color: var(--text-muted); text-align: center;">
                *Latar berpetak (checkerboard) hanya indikator area transparan. Hasil akhir murni transparan PNG.
            </span>
        </div>

    </div>

    <div class="toast" id="toast">Berhasil disalin!</div>

    <script>
        const templates = [
            'neon-grid', 'apex-bold', 'minimal-corner', 'speedster', 'clean-bottom',
            'dark-badge', 'cyber', 'split', 'chrono', 'bolt',
            'mono-stack', 'elegant', 'street', 'modernist', 'aero',
            'tokyo', 'alpha', 'central', 'military', 'neon-pulse'
        ];

        let activeTemplateId = 'neon-grid';

        const distanceInput = document.getElementById('distance');
        const paceInput = document.getElementById('pace');
        const timeInput = document.getElementById('time');
        const containerCapture = document.getElementById('overlay-capture');
        const templateGrid = document.getElementById('template-list');

        function timeToSeconds(timeStr) {
            const parts = timeStr.split(':').map(Number);
            if (parts.length === 3) return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
            if (parts.length === 2) return (parts[0] * 60) + parts[1];
            return 0;
        }

        function secondsToTime(totalSeconds) {
            const hrs = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = Math.round(totalSeconds % 60);
            return [
                hrs.toString().padStart(2, '0'),
                mins.toString().padStart(2, '0'),
                secs.toString().padStart(2, '0')
            ].join(':');
        }

        function secondsToPace(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = Math.round(totalSeconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        distanceInput.addEventListener('input', () => calculateMetrics('distance'));
        paceInput.addEventListener('input', () => calculateMetrics('pace'));
        timeInput.addEventListener('input', () => calculateMetrics('time'));

        function calculateMetrics(triggerSource) {
            const dist = parseFloat(distanceInput.value);
            if (!dist || dist <= 0) return;

            if (triggerSource === 'distance' || triggerSource === 'pace') {
                const paceSecs = timeToSeconds(paceInput.value);
                if (paceSecs > 0) {
                    timeInput.value = secondsToTime(paceSecs * dist);
                }
            } else if (triggerSource === 'time') {
                const timeSecs = timeToSeconds(timeInput.value);
                if (timeSecs > 0) {
                    paceInput.value = secondsToPace(timeSecs / dist);
                }
            }
            renderTemplate();
        }

        function initTemplateSelector() {
            templates.forEach((tplId, index) => {
                const item = document.createElement('div');
                item.className = `template-item ${tplId === activeTemplateId ? 'active' : ''}`;
                item.textContent = index + 1;
                item.onclick = () => {
                    document.querySelectorAll('.template-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    activeTemplateId = tplId;
                    renderTemplate();
                };
                templateGrid.appendChild(item);
            });
        }

        function renderTemplate() {
            const dist = distanceInput.value || '0.00';
            const pace = paceInput.value || '00:00';
            const time = timeInput.value || '00:00:00';

            containerCapture.className = `tpl-${activeTemplateId}`;

            switch(activeTemplateId) {
                case 'neon-grid':
                case 'cyber':
                case 'bolt':
                case 'aero':
                case 'neon-pulse':
                    containerCapture.innerHTML = `
                        <div><div class="ov-label">Distance</div><div class="ov-data">${dist} KM</div></div>
                        <div><div class="ov-label">Pace</div><div class="ov-data">${pace}</div></div>
                        <div><div class="ov-label">Time</div><div class="ov-data">${time}</div></div>
                    `;
                    break;
                case 'apex-bold':
                    containerCapture.innerHTML = `
                        <div style="display:flex; gap: 20px;">
                            <div style="text-align:center"><div class="ov-data">${dist}</div><div class="ov-label" style="font-size:0.7rem">Kilometers</div></div>
                            <div style="text-align:center"><div class="ov-data">${pace}</div><div class="ov-label" style="font-size:0.7rem">Avg Pace</div></div>
                            <div style="text-align:center"><div class="ov-data">${time}</div><div class="ov-label" style="font-size:0.7rem">Time Elapsed</div></div>
                        </div>
                    `;
                    break;
                case 'minimal-corner':
                    containerCapture.innerHTML = `
                        <div style="display:flex; justify-content:space-between; width:100%">
                            <div><div class="ov-data" style="font-size:2rem">${dist}</div><div class="ov-label" style="font-size:0.65rem">KM</div></div>
                            <div style="text-align:right"><div class="ov-data" style="font-size:1.2rem">${pace}</div><div class="ov-label" style="font-size:0.65rem">Pace</div></div>
                        </div>
                        <div style="width:100%; text-align:left; margin-top:auto">
                            <div class="ov-label" style="font-size:0.65rem; letter-spacing:3px">Total Time</div><div class="ov-data" style="font-size:1.5rem">${time}</div>
                        </div>
                    `;
                    break;
                case 'speedster':
                    containerCapture.innerHTML = `
                        <div style="margin-bottom:10px"><div class="ov-label" style="font-size:1rem;color:#fff">DIST</div><div class="ov-data">${dist} <span style="font-size:1.5rem">KM</span></div></div>
                        <div style="display:flex; gap:30px">
                            <div><div class="ov-label" style="font-size:0.8rem;color:#fff">PACE</div><div class="ov-data" style="font-size:2rem">${pace}</div></div>
                            <div><div class="ov-label" style="font-size:0.8rem;color:#fff">TIME</div><div class="ov-data" style="font-size:2rem">${time}</div></div>
                        </div>
                    `;
                    break;
                case 'clean-bottom':
                case 'alpha':
                    containerCapture.innerHTML = `
                        <div style="text-align:center"><div class="ov-label" style="font-size:0.65rem">Distance</div><div class="ov-data">${dist} km</div></div>
                        <div style="text-align:center"><div class="ov-label" style="font-size:0.65rem">Pace</div><div class="ov-data">${pace}</div></div>
                        <div style="text-align:center"><div class="ov-label" style="font-size:0.65rem">Time</div><div class="ov-data">${time}</div></div>
                    `;
                    break;
                case 'dark-badge':
                    containerCapture.innerHTML = `
                        <div class="box"><span class="ov-label">DIST: </span><span class="ov-data">${dist} KM</span></div>
                        <div class="box"><span class="ov-label">PACE: </span><span class="ov-data">${pace}</span></div>
                        <div class="box"><span class="ov-label">TIME: </span><span class="ov-data">${time}</span></div>
                    `;
                    break;
                case 'split':
                    containerCapture.innerHTML = `
                        <div class="top">
                            <div><span class="ov-label">PACE:</span> <span class="ov-data">${pace}</span></div>
                            <div><span class="ov-label">TIME:</span> <span class="ov-data">${time}</span></div>
                        </div>
                        <div class="bottom">
                            <span class="ov-data">${dist}</span> <span style="font-size:1.5rem; color:#fff">KM</span>
                        </div>
                    `;
                    break;
                case 'chrono':
                    containerCapture.innerHTML = `
                        <div style="margin-bottom:auto; width:100%"><div class="ov-data" style="font-size:3rem; font-weight:900; color:#3b82f6">${dist}</div><div class="ov-label" style="font-size:0.7rem">跑 / KM</div></div>
                        <div><div class="ov-label" style="font-size:0.6rem">Pace</div><div class="ov-data" style="font-size:1.4rem">${pace}</div></div>
                        <div style="margin-top:5px"><div class="ov-label" style="font-size:0.6rem">Duration</div><div class="ov-data" style="font-size:1.4rem">${time}</div></div>
                    `;
                    break;
                case 'mono-stack':
                    containerCapture.innerHTML = `
                        <div><span class="ov-label">> DIST . </span><span class="ov-data" style="color:#22c55e">${dist} KM</span></div>
                        <div><span class="ov-label">> PACE . </span><span class="ov-data" style="color:#38bdf8">${pace}</span></div>
                        <div><span class="ov-label">> TIME . </span><span class="ov-data" style="color:#e11d48">${time}</span></div>
                    `;
                    break;
                case 'elegant':
                    containerCapture.innerHTML = `
                        <div><div class="ov-data" style="font-size:1.8rem;color:#fff">${dist}</div><div class="ov-label" style="font-size:0.6rem;color:#94a3b8">KILOMETERS</div></div>
                        <div><div class="ov-data" style="font-size:1.3rem;color:#fff">${pace}</div><div class="ov-label" style="font-size:0.6rem;color:#94a3b8">AVG PACE</div></div>
                        <div><div class="ov-data" style="font-size:1.3rem;color:#fff">${time}</div><div class="ov-label" style="font-size:0.6rem;color:#94a3b8">TIME</div></div>
                    `;
                    break;
                case 'street':
                    containerCapture.innerHTML = `
                        <div class="main-stat" style="margin-bottom:10px"><div class="ov-label" style="font-size:0.8rem">RUN DISTANCE</div><div class="ov-data">${dist} KM</div></div>
                        <div style="display:flex; gap:25px">
                            <div><div class="ov-label" style="font-size:0.7rem">AVG PACE</div><div class="ov-data" style="font-size:2.2rem">${pace}</div></div>
                            <div><div class="ov-label" style="font-size:0.7rem">ELAPSED TIME</div><div class="ov-data" style="font-size:2.2rem">${time}</div></div>
                        </div>
                    `;
                    break;
                case 'modernist':
                    containerCapture.innerHTML = `
                        <div class="box"><div class="ov-data" style="font-size:1.4rem">${dist}</div><div class="ov-label" style="font-size:0.6rem">KM</div></div>
                        <div class="box"><div class="ov-data" style="font-size:1.1rem">${pace}</div><div class="ov-label" style="font-size:0.6rem">Pace</div></div>
                        <div class="box"><div class="ov-data" style="font-size:1.1rem">${time}</div><div class="ov-label" style="font-size:0.6rem">Time</div></div>
                    `;
                    break;
                case 'tokyo':
                    containerCapture.innerHTML = `
                        <div class="border-box"><div class="ov-label" style="font-size:0.65rem">DIST</div><div class="ov-data" style="font-size:1.5rem;color:#facc15">${dist} KM</div></div>
                        <div style="display:flex; justify-content:space-between; width:100%; margin-top:auto">
                            <div><div class="ov-label" style="font-size:0.65rem">PACE</div><div class="ov-data">${pace}</div></div>
                            <div style="text-align:right"><div class="ov-label" style="font-size:0.65rem">TIME</div><div class="ov-data">${time}</div></div>
                        </div>
                    `;
                    break;
                case 'central':
                    containerCapture.innerHTML = `
                        <div class="main-circle"><div class="ov-data" style="font-size:2.2rem; line-height:1">${dist}</div><div class="ov-label" style="font-size:0.65rem">KM</div></div>
                        <div style="display:flex; gap:40px; text-align:center">
                            <div><div class="ov-label" style="font-size:0.65rem">Pace</div><div class="ov-data" style="font-size:1.1rem">${pace}</div></div>
                            <div><div class="ov-label" style="font-size:0.65rem">Time</div><div class="ov-data" style="font-size:1.1rem">${time}</div></div>
                        </div>
                    `;
                    break;
                case 'military':
                    containerCapture.innerHTML = `
                        <div class="box">
                            <div class="ov-data" style="font-size:2.8rem; line-height:0.9; margin-bottom:5px">${dist} KM</div>
                            <div style="display:flex; gap:20px; font-size:1.1rem">
                                <div><span class="ov-label">PCE:</span> <span class="ov-data">${pace}</span></div>
                                <div><span class="ov-label">TIM:</span> <span class="ov-data">${time}</span></div>
                            </div>
                        </div>
                    `;
                    break;
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function downloadOverlay() {
            html2canvas(containerCapture, { backgroundColor: null, scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `overlay-${activeTemplateId}-${distanceInput.value}k.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function copyOverlay() {
            html2canvas(containerCapture, { backgroundColor: null, scale: 2 }).then(canvas => {
                canvas.toBlob(blob => {
                    navigator.clipboard.write([
                        new ClipboardItem({ "image/png": blob })
                    ]).then(() => {
                        showToast("Overlay disalin ke clipboard!");
                    }).catch(err => {
                        showToast("Gagal menyalin.");
                    });
                }, 'image/png');
            });
        }

        initTemplateSelector();
        renderTemplate();
    </script>
</body>
</html>
